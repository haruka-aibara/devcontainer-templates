name: "Release Dev Container Templates & Generate Documentation"
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/release.yaml'

jobs:
  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: "Bump version"
        run: |
          FILE="src/haruka-aibara-dev-env/devcontainer-template.json"
          VERSION=$(jq -r .version "$FILE")
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qiE 'BREAKING'; then
            NEW_VERSION="$((MAJOR+1)).0.0"
          elif echo "$COMMIT_MSG" | grep -qE '^feat(\(.+\))?!?:'; then
            NEW_VERSION="${MAJOR}.$((MINOR+1)).0"
          else
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))"
          fi
          jq --arg v "$NEW_VERSION" '.version = $v' "$FILE" > tmp.json && mv tmp.json "$FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

      - name: "Publish Templates"
        uses: devcontainers/action@v1
        with:
          publish-templates: "true"
          base-path-to-templates: "./src"
          generate-docs: "true"

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
